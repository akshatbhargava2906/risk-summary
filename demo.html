<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Modal Demo</title>
  <script>
    class RiskModal extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: "open" });
        this._data = null;
      }

      connectedCallback() {
        this._render();
      }

      open(data) {
        this._data = data;
        this._render();
        this.shadowRoot.querySelector(".overlay").classList.add("visible");
        document.body.style.overflow = "hidden";
      }

      close() {
        this.shadowRoot.querySelector(".overlay").classList.remove("visible");
        document.body.style.overflow = "";
      }

      _tierColor(tier) {
        const map = { "Normal": "#22863a", "High": "#b45309", "Risk": "#c0392b" };
        return map[tier] || "#555";
      }

      _tierBg(tier) {
        const map = { "Normal": "#f0fdf4", "High": "#fffbeb", "Risk": "#fff5f5" };
        return map[tier] || "#f5f5f5";
      }

      _statusColor(status) {
        const map = { "normal": "#e6f4ea", "abnormal": "#fff8e1", "critical": "#fdecea" };
        return map[status] || "transparent";
      }

      _row(label, value) {
        if (!value) return "";
        return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${value}</span></div>`;
      }

      _indicatorRows(indicators) {
        if (!indicators || indicators.length === 0) return `<tr><td colspan="6" class="empty">No flagged indicators.</td></tr>`;
        return indicators.map(ind => `
          <tr style="background:${this._statusColor(ind.status)}">
            <td>${ind.source || "—"}</td>
            <td>${ind.name || "—"}</td>
            <td>${ind.value || "—"} ${ind.unit || ""}</td>
            <td>${ind.reference_range || "—"}</td>
            <td><span class="badge badge-${ind.status}">${ind.status || "—"}</span></td>
            <td>${ind.note || "—"}</td>
          </tr>`).join("");
      }

      _render() {
        const d = this._data;
        const p = d?.patient || {};
        const ins = d?.insurance || {};
        const ra = d?.risk_assessment || {};
        const tierColor = this._tierColor(ra.tier);
        const tierBg = this._tierBg(ra.tier);

        this.shadowRoot.innerHTML = `
          <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            .overlay {
              display: none;
              position: fixed;
              inset: 0;
              background: rgba(0,0,0,0.45);
              z-index: 9999;
              align-items: center;
              justify-content: center;
              padding: 24px;
            }
            .overlay.visible { display: flex; }

            .modal {
              background: #fff;
              border-radius: 12px;
              width: 100%;
              max-width: 860px;
              max-height: 90vh;
              display: flex;
              flex-direction: column;
              overflow: hidden;
              box-shadow: 0 8px 40px rgba(0,0,0,0.18);
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              color: #1a1a1a;
            }

            .modal-header {
              display: flex;
              align-items: center;
              justify-content: space-between;
              padding: 20px 28px;
              border-bottom: 1px solid #eee;
              flex-shrink: 0;
            }
            .modal-title { font-size: 17px; font-weight: 600; color: #111; }
            .close-btn {
              width: 32px; height: 32px;
              border: none; background: #f3f3f3;
              border-radius: 50%; cursor: pointer;
              font-size: 18px; display: flex;
              align-items: center; justify-content: center;
              color: #555; transition: background 0.15s;
            }
            .close-btn:hover { background: #e8e8e8; }

            .modal-body {
              overflow-y: auto; padding: 28px;
              display: flex; flex-direction: column; gap: 28px;
            }

            .score-banner {
              display: flex; align-items: center; gap: 24px;
              padding: 20px 24px; border-radius: 10px;
              background: ${tierBg};
              border: 1px solid ${tierColor}33;
            }
            .score-circle {
              width: 72px; height: 72px; border-radius: 50%;
              border: 3px solid ${tierColor};
              display: flex; flex-direction: column;
              align-items: center; justify-content: center; flex-shrink: 0;
            }
            .score-number { font-size: 22px; font-weight: 700; color: ${tierColor}; line-height: 1; }
            .score-denom  { font-size: 11px; color: ${tierColor}; opacity: 0.7; }
            .score-meta { flex: 1; }
            .score-tier { font-size: 20px; font-weight: 700; color: ${tierColor}; }
            .score-breakdown { font-size: 13px; color: #666; margin-top: 4px; }
            .score-counts { display: flex; gap: 20px; margin-top: 8px; }
            .score-count { font-size: 13px; color: #444; }
            .score-count strong { color: #111; }

            .section-title {
              font-size: 13px; font-weight: 600;
              text-transform: uppercase; letter-spacing: 0.06em;
              color: #888; margin-bottom: 14px;
            }

            .info-grid {
              display: grid; grid-template-columns: 1fr 1fr;
              gap: 0; border: 1px solid #eee;
              border-radius: 8px; overflow: hidden;
            }
            .info-row { display: contents; }
            .info-label {
              padding: 10px 14px; font-size: 13px; color: #666;
              background: #fafafa; border-bottom: 1px solid #eee;
              border-right: 1px solid #eee;
            }
            .info-value {
              padding: 10px 14px; font-size: 13px; color: #111;
              border-bottom: 1px solid #eee;
            }
            .info-row:last-child .info-label,
            .info-row:last-child .info-value { border-bottom: none; }

            .tags { display: flex; flex-wrap: wrap; gap: 6px; }
            .tag { font-size: 12px; background: #f0f0f0; border-radius: 4px; padding: 3px 8px; color: #333; }

            .summary-text {
              font-size: 14px; line-height: 1.65; color: #333;
              background: #fafafa; border-radius: 8px;
              padding: 16px 18px; border: 1px solid #eee;
            }

            .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
            table { width: 100%; border-collapse: collapse; font-size: 13px; }
            thead th {
              background: #f5f5f5; padding: 10px 12px;
              text-align: left; font-weight: 600; color: #444;
              border-bottom: 1px solid #e0e0e0; white-space: nowrap;
            }
            tbody td {
              padding: 9px 12px; border-bottom: 1px solid #f0f0f0;
              color: #222; vertical-align: top;
            }
            tbody tr:last-child td { border-bottom: none; }

            .badge {
              display: inline-block; padding: 2px 8px;
              border-radius: 4px; font-size: 11px;
              font-weight: 600; text-transform: capitalize;
            }
            .badge-normal   { background: #e6f4ea; color: #1e7e34; }
            .badge-abnormal { background: #fff8e1; color: #b45309; }
            .badge-critical { background: #fdecea; color: #c0392b; }

            .empty { text-align: center; color: #999; padding: 20px; }
          </style>

          <div class="overlay">
            <div class="modal" role="dialog" aria-modal="true" aria-label="Risk Analysis Report">

              <div class="modal-header">
                <span class="modal-title">Risk Analysis Report</span>
                <button class="close-btn" aria-label="Close">&#x2715;</button>
              </div>

              <div class="modal-body">

                <div class="score-banner">
                  <div class="score-circle">
                    <span class="score-number">${ra.score ?? "—"}</span>
                    <span class="score-denom">/100</span>
                  </div>
                  <div class="score-meta">
                    <div class="score-tier">${ra.tier || "—"}</div>
                    <div class="score-breakdown">
                      ${ra.indicator_points ?? 0} clinical pts + ${ra.questionnaire_points ?? 0} lifestyle pts
                    </div>
                    <div class="score-counts">
                      <span class="score-count"><strong>${ra.total_indicators ?? 0}</strong> indicators</span>
                      <span class="score-count"><strong>${ra.flagged_count ?? 0}</strong> flagged</span>
                    </div>
                  </div>
                </div>

                <div>
                  <div class="section-title">Patient Details</div>
                  <div class="info-grid">
                    ${this._row("Name", p.name)}
                    ${this._row("Age", p.age)}
                    ${this._row("Gender", p.gender)}
                    ${this._row("Location", p.location)}
                  </div>
                </div>

                <div>
                  <div class="section-title">Insurance & Lifestyle</div>
                  <div class="info-grid">
                    ${this._row("Current Coverage", ins.current_coverage)}
                    ${this._row("Coverage Amount", ins.coverage_amount)}
                    ${this._row("Previous Claims", ins.previous_claims)}
                    ${this._row("Smoking Status", ins.smoking_status)}
                    ${this._row("Pack Years", ins.pack_years)}
                    ${ins.family_history?.length ? `
                      <div class="info-label">Family History</div>
                      <div class="info-value">
                        <div class="tags">
                          ${ins.family_history.map(c => `<span class="tag">${c}</span>`).join("")}
                        </div>
                      </div>` : ""}
                  </div>
                </div>

                <div>
                  <div class="section-title">Summary</div>
                  <div class="summary-text">${d?.summary || "No summary available."}</div>
                </div>

                <div>
                  <div class="section-title">Flagged Indicators</div>
                  <div class="table-wrap">
                    <table>
                      <thead>
                        <tr>
                          <th>Source</th><th>Indicator</th><th>Result</th>
                          <th>Reference</th><th>Status</th><th>Note</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${this._indicatorRows(d?.flagged_indicators)}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            </div>
          </div>`;

        this.shadowRoot.querySelector(".overlay").addEventListener("click", (e) => {
          if (e.target === e.currentTarget) this.close();
        });
        this.shadowRoot.querySelector(".close-btn").addEventListener("click", () => this.close());
      }
    }

    customElements.define("risk-modal", RiskModal);
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 36px 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #111;
    }

    label {
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      display: block;
    }

    input[type="file"] {
      width: 100%;
      font-size: 13px;
      color: #333;
    }

    .api-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .api-row input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      color: #111;
    }

    button#analyse-btn {
      width: 100%;
      padding: 12px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button#analyse-btn:hover  { background: #1648c0; }
    button#analyse-btn:disabled { background: #93aee8; cursor: not-allowed; }

    .status {
      font-size: 13px;
      color: #555;
      min-height: 20px;
      text-align: center;
    }
    .status.error { color: #c0392b; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Medical Risk Analyzer</h1>

    <div>
      <label>API URL</label>
      <div class="api-row">
        <input type="text" id="api-url" value="http://127.0.0.1:8000/analyse" />
      </div>
    </div>

    <div>
      <label>Upload PDFs (questionnaire + lab reports)</label>
      <input type="file" id="file-input" accept=".pdf" multiple />
    </div>

    <button id="analyse-btn" onclick="runAnalysis()">Run Analysis</button>
    <div class="status" id="status"></div>
  </div>

  <risk-modal id="modal"></risk-modal>

  <script>
    const modal = document.getElementById("modal");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("analyse-btn");

    async function runAnalysis() {
      const files = document.getElementById("file-input").files;
      const url = document.getElementById("api-url").value.trim();

      if (!files.length) {
        setStatus("Select at least one PDF.", true);
        return;
      }

      btn.disabled = true;
      setStatus("Analysing — this may take a moment…");

      const form = new FormData();
      for (const f of files) {
        form.append("files", f, f.name);
      }

      try {
        const res = await fetch(url, { method: "POST", body: form });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }
        const data = await res.json();
        setStatus("");
        modal.open(data);
      } catch (e) {
        setStatus("Error: " + e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (isError ? " error" : "");
    }
  </script>
</body>
</html>
