<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Pipeline Demo</title>
  <script>
    class RiskModal extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: "open" });
        this._data = null;
      }

      connectedCallback() {
        this._render();
      }

      open(data) {
        this._data = data;
        this._render();
        this.shadowRoot.querySelector(".overlay").classList.add("visible");
        document.body.style.overflow = "hidden";
      }

      close() {
        this.shadowRoot.querySelector(".overlay").classList.remove("visible");
        document.body.style.overflow = "";
      }

      _tierColor(tier) {
        const map = { "Normal": "#22863a", "High": "#b45309", "Risk": "#c0392b" };
        return map[tier] || "#555";
      }

      _tierBg(tier) {
        const map = { "Normal": "#f0fdf4", "High": "#fffbeb", "Risk": "#fff5f5" };
        return map[tier] || "#f5f5f5";
      }

      _statusColor(status) {
        const map = { "normal": "#e6f4ea", "abnormal": "#fff8e1", "critical": "#fdecea" };
        return map[status] || "transparent";
      }

      _row(label, value) {
        if (!value) return "";
        return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${value}</span></div>`;
      }

      _indicatorRows(indicators) {
        if (!indicators || indicators.length === 0) return `<tr><td colspan="6" class="empty">No flagged indicators.</td></tr>`;
        return indicators.map(ind => `
          <tr style="background:${this._statusColor(ind.status)}">
            <td>${ind.source || "—"}</td>
            <td>${ind.name || "—"}</td>
            <td>${ind.value || "—"} ${ind.unit || ""}</td>
            <td>${ind.reference_range || "—"}</td>
            <td><span class="badge badge-${ind.status}">${ind.status || "—"}</span></td>
            <td>${ind.note || "—"}</td>
          </tr>`).join("");
      }

      _render() {
        const d = this._data;
        const p = d?.patient || {};
        const ins = d?.insurance || {};
        const ra = d?.risk_assessment || {};
        const tierColor = this._tierColor(ra.tier);
        const tierBg = this._tierBg(ra.tier);

        this.shadowRoot.innerHTML = `
          <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            .overlay {
              display: none;
              position: fixed;
              inset: 0;
              background: rgba(0,0,0,0.45);
              z-index: 9999;
              align-items: center;
              justify-content: center;
              padding: 24px;
            }
            .overlay.visible { display: flex; }

            .modal {
              background: #fff;
              border-radius: 12px;
              width: 100%;
              max-width: 860px;
              max-height: 90vh;
              display: flex;
              flex-direction: column;
              overflow: hidden;
              box-shadow: 0 8px 40px rgba(0,0,0,0.18);
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              color: #1a1a1a;
            }

            .modal-header {
              display: flex;
              align-items: center;
              justify-content: space-between;
              padding: 20px 28px;
              border-bottom: 1px solid #eee;
              flex-shrink: 0;
            }
            .modal-title { font-size: 17px; font-weight: 600; color: #111; }
            .close-btn {
              width: 32px; height: 32px;
              border: none; background: #f3f3f3;
              border-radius: 50%; cursor: pointer;
              font-size: 18px; display: flex;
              align-items: center; justify-content: center;
              color: #555; transition: background 0.15s;
            }
            .close-btn:hover { background: #e8e8e8; }

            .modal-body {
              overflow-y: auto; padding: 28px;
              display: flex; flex-direction: column; gap: 28px;
            }

            .score-banner {
              display: flex; align-items: center; gap: 24px;
              padding: 20px 24px; border-radius: 10px;
              background: ${tierBg};
              border: 1px solid ${tierColor}33;
            }
            .score-circle {
              width: 72px; height: 72px; border-radius: 50%;
              border: 3px solid ${tierColor};
              display: flex; flex-direction: column;
              align-items: center; justify-content: center; flex-shrink: 0;
            }
            .score-number { font-size: 22px; font-weight: 700; color: ${tierColor}; line-height: 1; }
            .score-denom  { font-size: 11px; color: ${tierColor}; opacity: 0.7; }
            .score-meta { flex: 1; }
            .score-tier { font-size: 20px; font-weight: 700; color: ${tierColor}; }
            .score-breakdown { font-size: 13px; color: #666; margin-top: 4px; }
            .score-counts { display: flex; gap: 20px; margin-top: 8px; }
            .score-count { font-size: 13px; color: #444; }
            .score-count strong { color: #111; }

            .section-title {
              font-size: 13px; font-weight: 600;
              text-transform: uppercase; letter-spacing: 0.06em;
              color: #888; margin-bottom: 14px;
            }

            .info-grid {
              display: grid; grid-template-columns: 1fr 1fr;
              gap: 0; border: 1px solid #eee;
              border-radius: 8px; overflow: hidden;
            }
            .info-row { display: contents; }
            .info-label {
              padding: 10px 14px; font-size: 13px; color: #666;
              background: #fafafa; border-bottom: 1px solid #eee;
              border-right: 1px solid #eee;
            }
            .info-value {
              padding: 10px 14px; font-size: 13px; color: #111;
              border-bottom: 1px solid #eee;
            }
            .info-row:last-child .info-label,
            .info-row:last-child .info-value { border-bottom: none; }

            .tags { display: flex; flex-wrap: wrap; gap: 6px; }
            .tag { font-size: 12px; background: #f0f0f0; border-radius: 4px; padding: 3px 8px; color: #333; }

            .summary-text {
              font-size: 14px; line-height: 1.65; color: #333;
              background: #fafafa; border-radius: 8px;
              padding: 16px 18px; border: 1px solid #eee;
            }

            .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
            table { width: 100%; border-collapse: collapse; font-size: 13px; }
            thead th {
              background: #f5f5f5; padding: 10px 12px;
              text-align: left; font-weight: 600; color: #444;
              border-bottom: 1px solid #e0e0e0; white-space: nowrap;
            }
            tbody td {
              padding: 9px 12px; border-bottom: 1px solid #f0f0f0;
              color: #222; vertical-align: top;
            }
            tbody tr:last-child td { border-bottom: none; }

            .badge {
              display: inline-block; padding: 2px 8px;
              border-radius: 4px; font-size: 11px;
              font-weight: 600; text-transform: capitalize;
            }
            .badge-normal   { background: #e6f4ea; color: #1e7e34; }
            .badge-abnormal { background: #fff8e1; color: #b45309; }
            .badge-critical { background: #fdecea; color: #c0392b; }

            .empty { text-align: center; color: #999; padding: 20px; }
          </style>

          <div class="overlay">
            <div class="modal" role="dialog" aria-modal="true" aria-label="Risk Analysis Report">

              <div class="modal-header">
                <span class="modal-title">Risk Analysis Report</span>
                <button class="close-btn" aria-label="Close">&#x2715;</button>
              </div>

              <div class="modal-body">

                <div class="score-banner">
                  <div class="score-circle">
                    <span class="score-number">${ra.score ?? "—"}</span>
                    <span class="score-denom">/100</span>
                  </div>
                  <div class="score-meta">
                    <div class="score-tier">${ra.tier || "—"}</div>
                    <div class="score-breakdown">
                      ${ra.indicator_points ?? 0} clinical pts + ${ra.questionnaire_points ?? 0} lifestyle pts
                    </div>
                    <div class="score-counts">
                      <span class="score-count"><strong>${ra.total_indicators ?? 0}</strong> indicators</span>
                      <span class="score-count"><strong>${ra.flagged_count ?? 0}</strong> flagged</span>
                    </div>
                  </div>
                </div>

                <div>
                  <div class="section-title">Patient Details</div>
                  <div class="info-grid">
                    ${this._row("Name", p.name)}
                    ${this._row("Age", p.age)}
                    ${this._row("Gender", p.gender)}
                    ${this._row("Location", p.location)}
                  </div>
                </div>

                <div>
                  <div class="section-title">Insurance & Lifestyle</div>
                  <div class="info-grid">
                    ${this._row("Current Coverage", ins.current_coverage)}
                    ${this._row("Coverage Amount", ins.coverage_amount)}
                    ${this._row("Previous Claims", ins.previous_claims)}
                    ${this._row("Smoking Status", ins.smoking_status)}
                    ${this._row("Pack Years", ins.pack_years)}
                    ${ins.family_history?.length ? `
                      <div class="info-label">Family History</div>
                      <div class="info-value">
                        <div class="tags">
                          ${ins.family_history.map(c => `<span class="tag">${c}</span>`).join("")}
                        </div>
                      </div>` : ""}
                  </div>
                </div>

                <div>
                  <div class="section-title">Summary</div>
                  <div class="summary-text">${d?.summary || "No summary available."}</div>
                </div>

                <div>
                  <div class="section-title">Flagged Indicators</div>
                  <div class="table-wrap">
                    <table>
                      <thead>
                        <tr>
                          <th>Source</th><th>Indicator</th><th>Result</th>
                          <th>Reference</th><th>Status</th><th>Note</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${this._indicatorRows(d?.flagged_indicators)}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            </div>
          </div>`;

        this.shadowRoot.querySelector(".overlay").addEventListener("click", (e) => {
          if (e.target === e.currentTarget) this.close();
        });
        this.shadowRoot.querySelector(".close-btn").addEventListener("click", () => this.close());
      }
    }

    customElements.define("risk-modal", RiskModal);
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .page { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .page.hidden { display: none; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    h1 { font-size: 19px; font-weight: 700; color: #111; }
    h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; color: #555; }
    .field .required { color: #c0392b; margin-left: 2px; }
    .field input, .field select {
      padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; color: #111; font-family: inherit;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr auto; gap: 14px; align-items: end; }

    .tag-input { display: flex; gap: 8px; }
    .tag-input input { flex: 1; }
    .tag-input button {
      padding: 0 14px; border: 1px solid #ddd; border-radius: 6px;
      background: #f7f7f7; font-size: 13px; cursor: pointer;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; background: #f0f0f0; border-radius: 4px;
      padding: 4px 8px; color: #333;
    }
    .tag button { border: none; background: none; cursor: pointer; color: #888; font-size: 13px; line-height: 1; }

    .btn-primary {
      padding: 12px; background: #1a56db; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1648c0; }
    .btn-primary:disabled { background: #93aee8; cursor: not-allowed; }

    .btn-secondary {
      padding: 12px; background: #f3f3f3; color: #333; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-secondary:hover { background: #e8e8e8; }

    .link-back { font-size: 13px; color: #1a56db; cursor: pointer; text-decoration: none; }

    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      border: 1px solid #eee; border-radius: 8px; overflow: hidden;
    }
    .info-row { display: contents; }
    .info-label {
      padding: 10px 14px; font-size: 13px; color: #666;
      background: #fafafa; border-bottom: 1px solid #eee; border-right: 1px solid #eee;
    }
    .info-value { padding: 10px 14px; font-size: 13px; color: #111; border-bottom: 1px solid #eee; }
    .info-row:last-child .info-label, .info-row:last-child .info-value { border-bottom: none; }

    .doc-list { display: flex; flex-direction: column; gap: 8px; }
    .doc-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border: 1px solid #eee; border-radius: 8px; font-size: 13px;
    }
    .doc-item .doc-name { color: #111; }
    .doc-item .doc-size { color: #999; margin-left: 8px; }
    .doc-item button { border: none; background: none; cursor: pointer; color: #c0392b; font-size: 14px; }
    .doc-empty { font-size: 13px; color: #999; padding: 8px 0; }

    .api-row input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }

    .status { font-size: 13px; color: #555; min-height: 20px; text-align: center; }
    .status.error { color: #c0392b; }

    .summary-text {
      font-size: 14px; line-height: 1.65; color: #333;
      background: #fafafa; border-radius: 8px;
      padding: 16px 18px; border: 1px solid #eee;
    }
    .summary-text.hidden { display: none; }

    /* Collapsible sections */
    details.section { border-top: 1px solid #eee; padding-top: 14px; }
    details.section:first-of-type { border-top: none; padding-top: 0; }
    details.section summary {
      list-style: none; cursor: pointer; font-size: 15px; font-weight: 700;
      color: #111; padding-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    details.section summary::-webkit-details-marker { display: none; }
    details.section summary::before { content: "▸"; color: #1a56db; font-size: 12px; }
    details.section[open] summary::before { content: "▾"; }
    .section-body {
      background: #fafafa; border-radius: 8px; padding: 18px;
      display: flex; flex-direction: column; gap: 18px;
    }

    /* Yes/No question rows */
    .yesno-q { display: flex; flex-direction: column; gap: 8px; }
    .yesno-q .q-label { font-size: 13px; color: #444; line-height: 1.5; }
    .yesno-options { display: flex; gap: 20px; }
    .yesno-options label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #111; cursor: pointer; }

    /* Dynamic tables (Family Details / Insurance Details) */
    .mini-table-head {
      display: flex; align-items: center; justify-content: space-between;
    }
    .mini-table-head .title { font-size: 14px; font-weight: 700; color: #111; }
    .btn-add {
      width: 26px; height: 26px; border-radius: 50%; border: none;
      background: #1a56db; color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .mini-table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border-radius: 8px; overflow: hidden; }
    .mini-table th {
      text-align: left; padding: 10px 12px; background: #f5f5f5; color: #444;
      font-weight: 600; border-bottom: 1px solid #e0e0e0;
    }
    .mini-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #222; }
    .mini-table .no-data { text-align: center; color: #999; padding: 16px; }
    .mini-table td button { border: none; background: none; color: #c0392b; cursor: pointer; }

    .add-row-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; background: #fff; padding: 14px; border-radius: 8px; }
    .add-row-form input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .add-row-form .actions { grid-column: 1 / -1; display: flex; gap: 8px; }
    .add-row-form .actions button { padding: 8px 14px; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; }
    .add-row-form .actions .btn-confirm { background: #1a56db; color: #fff; }
    .add-row-form .actions .btn-cancel { background: #eee; color: #333; }

    .amount-row { display: flex; gap: 8px; align-items: center; }
    .amount-row input { flex: 1; }
    .amount-row .currency { font-size: 13px; color: #666; }
  </style>
</head>
<body>

  <!-- Route: #/intake -->
  <div class="page" id="page-intake">
    <div class="card">
      <h1>Personal Details</h1>

      <div class="row">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="f-name" placeholder="Wayne Rooney">
        </div>
        <div class="field">
          <label>Age</label>
          <input type="text" id="f-age" placeholder="40">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Gender</label>
          <select id="f-gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field">
          <label>Location</label>
          <input type="text" id="f-location" placeholder="Singapore">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Smoking Status</label>
          <select id="f-smoking-status">
            <option>Never Smoker</option>
            <option>Former Smoker</option>
            <option>Current Smoker</option>
          </select>
        </div>
        <div class="field">
          <label>Pack Years</label>
          <input type="text" id="f-pack-years" placeholder="15">
        </div>
      </div>

      <div class="field">
        <label>Family History (conditions)</label>
        <div class="tag-input">
          <input type="text" id="f-family-input" placeholder="e.g. Hypertension">
          <button type="button" id="f-family-add">Add</button>
        </div>
        <div class="tags" id="f-family-tags"></div>
      </div>

      <div class="row">
        <div class="field">
          <label>Current Coverage</label>

        </div>
        <div class="field">
          <label>Coverage Amount</label>
          <input type="text" id="f-coverage-amount" placeholder="500000">

      </div>

        <input type="text" id="f-claims" placeholder="1 claim">

    <div class="card" id="questionnaire-card">
      <!-- Sections rendered by JS -->
    </div>

    <button class="btn-primary" id="btn-continue">Continue</button>
  </div>

  <!-- Route: #/review -->
  <div class="page hidden" id="page-review">
    <a class="link-back" id="link-edit">&larr; Edit personal details</a>

    <div class="card">
      <h2>Personal Details Summary</h2>
      <div class="info-grid" id="summary-grid"></div>
    </div>

    <div class="card">
      <h2>Personal Summary (AI Generated)</h2>
      <button class="btn-secondary" id="btn-summarize">Generate Summary</button>

      <div class="summary-text hidden" id="summarize-text"></div>
    </div>

      <h2>Medical Documents</h2>

      <div class="doc-list" id="doc-list"></div>

    <div class="card">
      <h2>API URL</h2>
      <div class="api-row">
        <input type="text" id="api-url" value="https://insurance-risk-analyser.cfapps.eu10-004.hana.ondemand.com/analyse">

      <button class="btn-primary" id="btn-analyse" disabled>Analyze and Give Summary</button>
      <div class="status" id="status"></div>
    </div>

    <button class="btn-secondary" id="btn-next">Next</button>
  </div>

  <risk-modal id="modal"></risk-modal>

  <script>
    const state = {
      patient: null,
      familyHistory: [],
      files: [],
      familyDetails: [],
      insuranceDetails: [],
    };

    // ─ Question definitions (Medical and Avocation History, Personal Habits, Occupational Details) ─

    const HABITS_QUESTIONS = [
      { key: "tobacco", label: "Has the insured person ever consumed any form of tobacco?", required: true, defaultVal: "No" },
      { key: "addictive_substances", label: "Does, or has, the insured person ever used addictive substances:", required: true, defaultVal: "No" },
      { key: "alcohol", label: "Does or has the insured person ever consumed alcohol in a habitual manner?", required: true, defaultVal: "No" },
    ];

    const OCCUPATIONAL_QUESTIONS = [
      { key: "dangerous_occupation", label: "Does the Insured participate in any occupation or activities, involving high speed, air travel, sea travel, or other dangerous risks, other than as a regular fare paying passenger?" },
      { key: "dangerous_sport", label: "Has the insured ever been involved or planning to be involved in a dangerous sport or hobby? (E.g. diving, mountaineering, parachuting, private aviation, racing, etc.?)" },
      { key: "incapable_of_working", label: "Is the insured person presently incapable of working/attending school or have you been incapable of working/attending school for more than 7 days during the last 5 years?" },
    ];

    const MEDICAL_QUESTIONS = [
      { key: "heart_issues", label: "Chest pain, arrhythmia, palpatation, high or low blood pressure, heart murmur, heart attack, pulmonary hypertension or other heart issue:" },
      { key: "diabetes_thyroid", label: "Diabetes, thyroid problem or any other hormonal disorder:" },
      { key: "eent_problems", label: "Eye, ear, nose or throat problems e.g. ear discharge, cataract, glaucoma, nasal bleeding or speech impairment, hearing, visual impairments:" },
      { key: "respiratory_problems", label: "Asthma, blood spitting, persistent cough, pleurisy, bronchitis, tuberculosis or other respiratory problem?:" },
      { key: "blood_disorders", label: "Anaemia, haemophilia, thalassemia or any other disorders of the blood?:" },
      { key: "liver_digestive", label: "Cirrhosis, fatty liver, hepatitis (including hepatitis carrier), jaundice, gastric ulcer, hernia, chronic indigestion, gallbladder disease (including infections of gall bladder or gall stones), pancreatitis, bleeding of intestines, stomach, bowel or rectum, or any other liver or digestive system disease?:" },
      { key: "is_child", label: "Is Insured a Child ?:" },
      { key: "c_section_treatment", label: "Required any special medical treatment during and/or after giving birth (operation, forkcet) C-section:" },
      { key: "mental_sickness", label: "Have any symptom of mental sickness:" },
      { key: "twin", label: "Have twin brother/ sister?:" },
      { key: "pregnant", label: "Is the insured currently pregnant?:" },
      { key: "abnormal_bleeding", label: "Has the insured ever had abnormal bleeding:" },
      { key: "kidney_urine", label: "Albumin, blood, pus or sugar found in urine, renal stones or any other disorders of the kidney, bladder or genital organs?:" },
      { key: "nervous_system", label: "Stroke ,epilepsy, paralysis, numbness, dizziness, prolonged headache, loss of balance or fits or other nervous system diseases?:" },
      { key: "cancer_tumour", label: "Cancer or tumour, cyst, lump or other growths of any kind?:" },
      { key: "musculoskeletal", label: "Arthritis, gout, severe injury, physical disability or other musculoskeletal disorder?:" },
      { key: "alcoholism_substance_mental", label: "Alcoholism, substance or drug abuse, depression, psychological or mental disorder?:" },
      { key: "std_hiv", label: "Sexually transmitted disease (such as gonorrhea, syphilis, urethritis), AIDS or AIDS related condition or infection with Human Immunodeficiency Virus (HIV)?:" },
      { key: "congenital", label: "Congenital anomalies and physical defects?:" },
      { key: "medication_prescribed", label: "Are you currently taking any medication or drugs:prescribed by a doctor:" },
      { key: "medication_not_prescribed", label: "Are you currently taking any medication or drugs:not prescribed by a doctor:" },
      { key: "recent_medical_exam", label: "In the past 5 years, have you undergone, or been required to undergo any medical examination (including X-ray, mammography, ultrasound, echocardiogram, angiogram gynecological investigations, pap smear, or blood tests), consultation of a doctor, hospitalization or surgery? (except for cold, influenza, employment or immigration checkup):" },
      { key: "given_birth", label: "Has the insured ever given birth:" },
      { key: "birth_special_treatment", label: "Has the insured ever had special treatment while giving birth:" },
      { key: "pap_diagnostics", label: "Has the insured ever had Pap's, ... diagnostics?:" },
    ];

    function yesNoRow(q) {
      const name = `q-${q.key}`;
      const yesChecked = q.defaultVal === "Yes" ? "checked" : "";
      const noChecked = q.defaultVal === "No" ? "checked" : "";
      return `
        <div class="yesno-q">
          <div class="q-label">${q.label}${q.required ? '<span class="required">*</span>' : ""}</div>
          <div class="yesno-options">
            <label><input type="radio" name="${name}" value="Yes" ${yesChecked}> Yes</label>
            <label><input type="radio" name="${name}" value="No" ${noChecked}> No</label>
          </div>
        </div>`;
    }

    function readYesNo(key) {
      const el = document.querySelector(`input[name="q-${key}"]:checked`);
      return el ? el.value : "";
    }

    // ─ Questionnaire sections (Physical / Habits / Occupational / Medical / Family / Insurance / Financial) ─

    function renderQuestionnaireCard() {
      document.getElementById("questionnaire-card").innerHTML = `
        <details class="section" open>
          <summary>Physical Details</summary>
          <div class="section-body">
            <div class="row">
              <div class="field">
                <label>Height / Unit</label>
                <input type="text" id="phy-height" placeholder="Enter height">
              </div>
              <div class="field">
                <label>&nbsp;</label>
                <select id="phy-height-unit">
                  <option>Centimeters</option>
                  <option>Inches</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label>Weight / Unit</label>
                <input type="text" id="phy-weight" placeholder="Enter weight">
              </div>
              <div class="field">
                <label>&nbsp;</label>
                <select id="phy-weight-unit">
                  <option>Kilograms</option>
                  <option>Pounds</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label>Change In Weight over last year</label>
                <select id="phy-weight-change-dir">
                  <option>Increase</option>
                  <option>Decrease</option>
                  <option>No Change</option>
                </select>
              </div>
              <div class="field">
                <label>Amount</label>
                <input type="text" id="phy-weight-change-amount" placeholder="Enter weight">
              </div>
            </div>
          </div>
        </details>

        <details class="section" open>
          <summary>Personal Habits</summary>
          <div class="section-body">
            ${HABITS_QUESTIONS.map(yesNoRow).join("")}
          </div>
        </details>

        <details class="section" open>
          <summary>Occupational Details</summary>
          <div class="section-body">
            ${OCCUPATIONAL_QUESTIONS.map(yesNoRow).join("")}
          </div>
        </details>

        <details class="section" open>
          <summary>Medical and Avocation History</summary>
          <div class="section-body">
            ${MEDICAL_QUESTIONS.map(yesNoRow).join("")}
          </div>
        </details>

        <details class="section" open>
          <summary>Family History</summary>
          <div class="section-body">
            ${yesNoRow({ key: "has_family_history", required: true, defaultVal: "No",
              label: "Does the insured have any close family relations (parent and/or sibling) who has suffered/ is suffering from, or died under the age of 60 due to any of the following conditions: Heart disease, diabetes, stroke, hypertension, raised cholesterol, cancer, multiple sclerosis, Alzheimer disease, Parkinson disease or any hereditary disease?:" })}
            <div class="mini-table-head">
              <span class="title">Family Details</span>
              <button type="button" class="btn-add" id="btn-add-family">+</button>
            </div>
            <div id="add-family-form"></div>
            <table class="mini-table">
              <thead><tr><th>Family Member</th><th>Relation to Insured</th><th>Age</th><th>Health condition</th><th></th></tr></thead>
              <tbody id="family-details-body"></tbody>
            </table>
          </div>
        </details>

        <details class="section" open>
          <summary>Insurance Details</summary>
          <div class="section-body">
            ${yesNoRow({ key: "has_insurance", required: true, defaultVal: "No",
              label: "Are you currently insured or applying for any medical, hospitalization, critical illness, accident or life insurance?:" })}
            <div class="mini-table-head">
              <span class="title">Insurance Details</span>
              <button type="button" class="btn-add" id="btn-add-insurance">+</button>
            </div>
            <div id="add-insurance-form"></div>
            <table class="mini-table">
              <thead><tr><th>Insurance Company</th><th>Policy Number</th><th>Sum Insured</th><th>Policy Effective Date</th><th>Current Status</th><th></th></tr></thead>
              <tbody id="insurance-details-body"></tbody>
            </table>
          </div>
        </details>

        <details class="section" open>
          <summary>Financial Details</summary>
          <div class="section-body">
            ${yesNoRow({ key: "employed", defaultVal: "Yes", label: "Are you currently employed ?:" })}
            <div class="row">
              <div class="field">
                <label>Job Industry <span class="required">*</span></label>
                <select id="fin-job-industry">
                  <option>IT</option>
                  <option>Finance</option>
                  <option>Healthcare</option>
                  <option>Education</option>
                  <option>Manufacturing</option>
                  <option>Retail</option>
                  <option>Government</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="field">
                <label>Job Title <span class="required">*</span></label>
                <select id="fin-job-title">
                  <option>Consultant</option>
                  <option>Manager</option>
                  <option>Engineer</option>
                  <option>Executive</option>
                  <option>Analyst</option>
                  <option>Administrator</option>
                  <option>Other</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>What is your annual income? <span class="required">*</span></label>
              <div class="amount-row">
                <input type="text" id="fin-annual-income" placeholder="100,000.00">
                <span class="currency">EUR</span>
              </div>
            </div>
            ${yesNoRow({ key: "primary_earner", label: "Are you the primary income earner in your household?:" })}
            ${yesNoRow({ key: "outstanding_debt", label: "Do you have any outstanding debt or financial obligations, such as credit card debt or student loans?:" })}
            ${yesNoRow({ key: "homeowner", label: "Are you a homeowner or a renter?:" })}
            <div class="field">
              <label>What is the value of your home, if you own one?</label>
              <div class="amount-row">
                <input type="text" id="fin-home-value" placeholder="0.00">
                <span class="currency">EUR</span>
              </div>
            </div>
            ${yesNoRow({ key: "other_assets", label: "Do you have any other assets, such as a car or investment accounts?:" })}
            <div class="field">
              <label>What is your credit score?</label>
              <input type="text" id="fin-credit-score" placeholder="Enter credit score">
            </div>
            ${yesNoRow({ key: "planning_retire", label: "Are you planning to retire in the near future?:" })}
            ${yesNoRow({ key: "filed_claim", label: "Have you ever filed a claim for life insurance in the past?:" })}
          </div>
        </details>
      `;

      renderFamilyDetailsTable();
      renderInsuranceDetailsTable();
      document.getElementById("btn-add-family").addEventListener("click", showAddFamilyForm);
      document.getElementById("btn-add-insurance").addEventListener("click", showAddInsuranceForm);
    }

    // ─ Family Details / Insurance Details dynamic tables ─

    function renderFamilyDetailsTable() {
      const body = document.getElementById("family-details-body");
      if (state.familyDetails.length === 0) {
        body.innerHTML = `<tr><td class="no-data" colspan="5">No data</td></tr>`;
        return;
      }
      body.innerHTML = state.familyDetails.map((r, i) => `
        <tr>
          <td>${r.member}</td><td>${r.relation}</td><td>${r.age}</td><td>${r.condition}</td>
          <td><button data-i="${i}">&#x2715;</button></td>
        </tr>`).join("");
      body.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          state.familyDetails.splice(Number(btn.dataset.i), 1);
          renderFamilyDetailsTable();
        });
      });
    }

    function showAddFamilyForm() {
      document.getElementById("add-family-form").innerHTML = `
        <div class="add-row-form">
          <input type="text" id="new-family-member" placeholder="Family Member">
          <input type="text" id="new-family-relation" placeholder="Relation to Insured">
          <input type="text" id="new-family-age" placeholder="Age">
          <input type="text" id="new-family-condition" placeholder="Health condition">
          <div class="actions">
            <button type="button" class="btn-confirm" id="confirm-add-family">Add</button>
            <button type="button" class="btn-cancel" id="cancel-add-family">Cancel</button>
          </div>
        </div>`;
      document.getElementById("confirm-add-family").addEventListener("click", () => {
        state.familyDetails.push({
          member: document.getElementById("new-family-member").value.trim(),
          relation: document.getElementById("new-family-relation").value.trim(),
          age: document.getElementById("new-family-age").value.trim(),
          condition: document.getElementById("new-family-condition").value.trim(),
        });
        document.getElementById("add-family-form").innerHTML = "";
        renderFamilyDetailsTable();
      });
      document.getElementById("cancel-add-family").addEventListener("click", () => {
        document.getElementById("add-family-form").innerHTML = "";
      });
    }

    function renderInsuranceDetailsTable() {
      const body = document.getElementById("insurance-details-body");
      if (state.insuranceDetails.length === 0) {
        body.innerHTML = `<tr><td class="no-data" colspan="6">No data</td></tr>`;
        return;
      }
      body.innerHTML = state.insuranceDetails.map((r, i) => `
        <tr>
          <td>${r.company}</td><td>${r.policyNumber}</td><td>${r.sumInsured}</td>
          <td>${r.effectiveDate}</td><td>${r.status}</td>
          <td><button data-i="${i}">&#x2715;</button></td>
        </tr>`).join("");
      body.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          state.insuranceDetails.splice(Number(btn.dataset.i), 1);
          renderInsuranceDetailsTable();
        });
      });
    }

    function showAddInsuranceForm() {
      document.getElementById("add-insurance-form").innerHTML = `
        <div class="add-row-form">
          <input type="text" id="new-ins-company" placeholder="Insurance Company">
          <input type="text" id="new-ins-policy" placeholder="Policy Number">
          <input type="text" id="new-ins-sum" placeholder="Sum Insured">
          <input type="text" id="new-ins-date" placeholder="Policy Effective Date">
          <input type="text" id="new-ins-status" placeholder="Current Status">
          <div class="actions">
            <button type="button" class="btn-confirm" id="confirm-add-insurance">Add</button>
            <button type="button" class="btn-cancel" id="cancel-add-insurance">Cancel</button>
          </div>
        </div>`;
      document.getElementById("confirm-add-insurance").addEventListener("click", () => {
        state.insuranceDetails.push({
          company: document.getElementById("new-ins-company").value.trim(),
          policyNumber: document.getElementById("new-ins-policy").value.trim(),
          sumInsured: document.getElementById("new-ins-sum").value.trim(),
          effectiveDate: document.getElementById("new-ins-date").value.trim(),
          status: document.getElementById("new-ins-status").value.trim(),
        });
        document.getElementById("add-insurance-form").innerHTML = "";
        renderInsuranceDetailsTable();
      });
      document.getElementById("cancel-add-insurance").addEventListener("click", () => {
        document.getElementById("add-insurance-form").innerHTML = "";
      });
    }

    // ─ Routing ─

    function render() {
      const route = location.hash || "#/intake";
      document.getElementById("page-intake").classList.toggle("hidden", route !== "#/intake");
      document.getElementById("page-review").classList.toggle("hidden", route !== "#/review");
      if (route === "#/review") renderSummary();
    }
    window.addEventListener("hashchange", render);

    // ─ Intake page ─

    const familyTagsEl = document.getElementById("f-family-tags");

    function renderFamilyTags() {
      familyTagsEl.innerHTML = state.familyHistory
        .map((c, i) => `<span class="tag">${c}<button data-i="${i}">&#x2715;</button></span>`)
        .join("");
      familyTagsEl.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          state.familyHistory.splice(Number(btn.dataset.i), 1);
          renderFamilyTags();
        });
      });
    }

    document.getElementById("f-family-add").addEventListener("click", () => {
      const input = document.getElementById("f-family-input");
      const val = input.value.trim();
      if (val) {
        state.familyHistory.push(val);
        input.value = "";
        renderFamilyTags();
      }
    });
    document.getElementById("f-family-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        document.getElementById("f-family-add").click();
      }
    });

    document.getElementById("btn-continue").addEventListener("click", () => {
      state.patient = {
        patient_name: document.getElementById("f-name").value.trim(),
        age: document.getElementById("f-age").value.trim(),
        gender: document.getElementById("f-gender").value,
        location: document.getElementById("f-location").value.trim(),
        smoking: {
          status: document.getElementById("f-smoking-status").value,
          pack_years: document.getElementById("f-pack-years").value.trim(),
        },
        family_history: [...state.familyHistory],
        insurance: {
          current_coverage: document.getElementById("f-coverage").value.trim(),
          coverage_amount: document.getElementById("f-coverage-amount").value.trim(),
          previous_claims: document.getElementById("f-claims").value.trim(),
        },
        physical_details: {
          height: document.getElementById("phy-height").value.trim(),
          height_unit: document.getElementById("phy-height-unit").value,
          weight: document.getElementById("phy-weight").value.trim(),
          weight_unit: document.getElementById("phy-weight-unit").value,
          weight_change_direction: document.getElementById("phy-weight-change-dir").value,
          weight_change_amount: document.getElementById("phy-weight-change-amount").value.trim(),
        },
        personal_habits: Object.fromEntries(HABITS_QUESTIONS.map(q => [q.key, readYesNo(q.key)])),
        occupational_details: Object.fromEntries(OCCUPATIONAL_QUESTIONS.map(q => [q.key, readYesNo(q.key)])),
        medical_history: Object.fromEntries(MEDICAL_QUESTIONS.map(q => [q.key, readYesNo(q.key)])),
        family_medical_history: {
          has_family_history: readYesNo("has_family_history"),
          family_details: [...state.familyDetails],
        },
        insurance_details: {
          has_insurance: readYesNo("has_insurance"),
          details: [...state.insuranceDetails],
        },
        financial_details: {
          employed: readYesNo("employed"),
          job_industry: document.getElementById("fin-job-industry").value,
          job_title: document.getElementById("fin-job-title").value,
          annual_income: document.getElementById("fin-annual-income").value.trim(),
          primary_earner: readYesNo("primary_earner"),
          outstanding_debt: readYesNo("outstanding_debt"),
          homeowner: readYesNo("homeowner"),
          home_value: document.getElementById("fin-home-value").value.trim(),
          other_assets: readYesNo("other_assets"),
          credit_score: document.getElementById("fin-credit-score").value.trim(),
          planning_retire: readYesNo("planning_retire"),
          filed_claim: readYesNo("filed_claim"),
        },
      };
      location.hash = "#/review";
    });

    // ─ Review page ─

    document.getElementById("link-edit").addEventListener("click", () => {
      location.hash = "#/intake";
    });

    function summaryRow(label, value) {
      if (!value) return "";
      return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${value}</span></div>`;
    }

    function renderSummary() {
      const p = state.patient;
      if (!p) {
        location.hash = "#/intake";
        return;
      }
      document.getElementById("summary-grid").innerHTML = [
        summaryRow("Name", p.patient_name),
        summaryRow("Age", p.age),
        summaryRow("Gender", p.gender),
        summaryRow("Location", p.location),
        summaryRow("Smoking Status", p.smoking.status),
        summaryRow("Pack Years", p.smoking.pack_years),
        summaryRow("Family History", p.family_history.join(", ")),
        summaryRow("Current Coverage", p.insurance.current_coverage),
        summaryRow("Coverage Amount", p.insurance.coverage_amount),
        summaryRow("Previous Claims", p.insurance.previous_claims),
        summaryRow("Height", p.physical_details.height ? `${p.physical_details.height} ${p.physical_details.height_unit}` : ""),
        summaryRow("Weight", p.physical_details.weight ? `${p.physical_details.weight} ${p.physical_details.weight_unit}` : ""),
        summaryRow("Tobacco Use", p.personal_habits.tobacco),
        summaryRow("Habitual Alcohol Use", p.personal_habits.alcohol),
        summaryRow("Job", p.financial_details.job_title ? `${p.financial_details.job_title} (${p.financial_details.job_industry})` : ""),
        summaryRow("Annual Income", p.financial_details.annual_income ? `${p.financial_details.annual_income} EUR` : ""),
      ].join("");
    }

    // ─ Personal summary (AI generated) ─

    function summarizeEndpoint() {
      const analyseUrl = document.getElementById("api-url").value.trim();
      return analyseUrl.replace(/\/analyse\/?$/, "") + "/summarize-patient";
    }

    const summarizeBtn = document.getElementById("btn-summarize");
    const summarizeStatusEl = document.getElementById("summarize-status");
    const summarizeTextEl = document.getElementById("summarize-text");

    summarizeBtn.addEventListener("click", async () => {
      if (!state.patient) return;

      summarizeBtn.disabled = true;
      summarizeStatusEl.textContent = "Summarising…";
      summarizeStatusEl.className = "status";
      summarizeTextEl.classList.add("hidden");

      try {
        const res = await fetch(summarizeEndpoint(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(state.patient),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }
        const data = await res.json();
        summarizeStatusEl.textContent = "";
        summarizeTextEl.textContent = data.summary || "No summary returned.";
        summarizeTextEl.classList.remove("hidden");
      } catch (e) {
        summarizeStatusEl.textContent = "Error: " + e.message;
        summarizeStatusEl.className = "status error";
      } finally {
        summarizeBtn.disabled = false;
      }
    });

    // ─ Document upload ─

    const fileInput = document.getElementById("file-input");
    const docListEl = document.getElementById("doc-list");
    const analyseBtn = document.getElementById("btn-analyse");

    function renderDocList() {
      if (state.files.length === 0) {
        docListEl.innerHTML = `<div class="doc-empty">No documents uploaded yet.</div>`;
      } else {
        docListEl.innerHTML = state.files.map((f, i) => `
          <div class="doc-item">
            <span><span class="doc-name">${f.name}</span><span class="doc-size">${(f.size / 1024).toFixed(1)} KB</span></span>
            <button data-i="${i}">&#x2715;</button>
          </div>`).join("");
        docListEl.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", () => {
            state.files.splice(Number(btn.dataset.i), 1);
            renderDocList();
          });
        });
      }
      analyseBtn.disabled = state.files.length === 0;
    }

    fileInput.addEventListener("change", () => {
      for (const f of fileInput.files) {
        if (!state.files.some(existing => existing.name === f.name && existing.size === f.size)) {
          state.files.push(f);
        }
      }
      fileInput.value = "";
      renderDocList();
    });

    renderDocList();

    // ─ Analyze ─

    const modal = document.getElementById("modal");
    const statusEl = document.getElementById("status");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (isError ? " error" : "");
    }

    document.getElementById("btn-analyse").addEventListener("click", async () => {
      const url = document.getElementById("api-url").value.trim();
      if (state.files.length === 0) {
        setStatus("Upload at least one PDF.", true);
        return;
      }

      analyseBtn.disabled = true;
      setStatus("Analysing — this may take a moment…");

      const form = new FormData();
      for (const f of state.files) form.append("files", f, f.name);
      form.append("patient_data", JSON.stringify(state.patient));

      try {
        const res = await fetch(url, { method: "POST", body: form });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }
        const data = await res.json();
        setStatus("");
        modal.open(data);
      } catch (e) {
        setStatus("Error: " + e.message, true);
      } finally {
        analyseBtn.disabled = state.files.length === 0;
      }
    });

    // "Next" — placeholder, no behavior yet.

    renderQuestionnaireCard();
    render();
  </script>
</body>
</html>
